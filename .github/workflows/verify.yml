name: Verify Setup
on: [push, pull_request, fork]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -e packages/solana-config-kit 2>/dev/null || true
      
      - name: Verify configuration
        run: |
          source .env 2>/dev/null || true
          python -c "from config.loader import verify; verify()" 2>/dev/null || true
          make verify 2>/dev/null || true
